<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>CHRONICLE | Independent Digital Newsroom</title>
    <meta name="description" content="Chronicle is a premium digital publication built for fast, credible, beautiful journalism. Politics, Technology, Business, Science, Sports and more." />
    <meta name="keywords" content="news, journalism, politics, technology, business, science, sports, entertainment" />
    <meta name="author" content="CHRONICLE" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://keon254.github.io/chronicle/" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#b68d40" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CHRONICLE" />
    <link rel="apple-touch-icon" href="favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CHRONICLE" />
    <meta property="og:title" content="CHRONICLE | Independent Digital Newsroom" />
    <meta property="og:description" content="Chronicle is a premium digital publication built for fast, credible, beautiful journalism." />
    <meta property="og:url" content="https://keon254.github.io/chronicle/" />
    <meta property="og:image" content="https://keon254.github.io/chronicle/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CHRONICLE — Independent Digital Newsroom" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@chronicle" />
    <meta name="twitter:title" content="CHRONICLE | Independent Digital Newsroom" />
    <meta name="twitter:description" content="Chronicle is a premium digital publication built for fast, credible, beautiful journalism." />
    <meta name="twitter:image" content="https://keon254.github.io/chronicle/opengraph.jpg" />
    <meta name="twitter:image:alt" content="CHRONICLE — Independent Digital Newsroom" />

    <!-- Performance: preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CHRONICLE",
      "url": "https://keon254.github.io/chronicle/",
      "logo": "https://keon254.github.io/chronicle/favicon.svg",
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CHRONICLE",
      "url": "https://keon254.github.io/chronicle/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://keon254.github.io/chronicle/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- SPA redirect decode for GitHub Pages 404 trick -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) +
            decoded[0] +
            (decoded[1] ? '&' + decoded[1].slice(1) : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register(
            (import.meta.env ? import.meta.env.BASE_URL : '/chronicle/') + 'sw.js'
          );
        });
      }
    </script>
  </body>
</html>
